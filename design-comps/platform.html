<style>
  :root {
    --bg:#EEF3F1; --surface:#FFFFFF; --surface-2:#F7FAF9;
    --ink:#15242B; --muted:#5A6B74; --faint:#8A9CA3;
    --line:#E1E8E6; --grid:#ECF1EF;
    --accent:#0E7C7B; --accent-2:#0B6463; --accent-tint:#E4F0EF;
    --ok:#2E7D4F; --ok-tint:#E8F2EC;
    --warn:#A96F14; --warn-tint:#F7EFDC;
    --crit:#B23A32; --crit-tint:#F8EAE8;
    --blue:#2C5FA8; --blue-tint:#E9EFF7;
    --shadow:0 1px 2px rgba(20,40,45,.04), 0 4px 16px rgba(20,40,45,.05);
    --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;
    --display:"Segoe UI Variable Display","Segoe UI Semibold","Segoe UI",system-ui,sans-serif;
    --mono:"Cascadia Code",ui-monospace,"SF Mono",Consolas,monospace;
  }
  @media (prefers-color-scheme: dark) { :root {
    --bg:#0D1416; --surface:#141E1F; --surface-2:#192425;
    --ink:#E7EEEC; --muted:#94A6A6; --faint:#6C8080;
    --line:#243231; --grid:#1E2C2B;
    --accent:#41B8AC; --accent-2:#5BC9BE; --accent-tint:#12312F;
    --ok:#54B583; --ok-tint:#14291F; --warn:#D69A3C; --warn-tint:#2E2410;
    --crit:#DE6A61; --crit-tint:#2F1512; --blue:#7BA3DE; --blue-tint:#16243A;
    --shadow:0 1px 2px rgba(0,0,0,.2), 0 6px 20px rgba(0,0,0,.28);
  } }
  :root[data-theme="dark"] {
    --bg:#0D1416; --surface:#141E1F; --surface-2:#192425;
    --ink:#E7EEEC; --muted:#94A6A6; --faint:#6C8080;
    --line:#243231; --grid:#1E2C2B;
    --accent:#41B8AC; --accent-2:#5BC9BE; --accent-tint:#12312F;
    --ok:#54B583; --ok-tint:#14291F; --warn:#D69A3C; --warn-tint:#2E2410;
    --crit:#DE6A61; --crit-tint:#2F1512; --blue:#7BA3DE; --blue-tint:#16243A;
    --shadow:0 1px 2px rgba(0,0,0,.2), 0 6px 20px rgba(0,0,0,.28);
  }
  :root[data-theme="light"] {
    --bg:#EEF3F1; --surface:#FFFFFF; --surface-2:#F7FAF9;
    --ink:#15242B; --muted:#5A6B74; --faint:#8A9CA3;
    --line:#E1E8E6; --grid:#ECF1EF;
    --accent:#0E7C7B; --accent-2:#0B6463; --accent-tint:#E4F0EF;
    --ok:#2E7D4F; --ok-tint:#E8F2EC; --warn:#A96F14; --warn-tint:#F7EFDC;
    --crit:#B23A32; --crit-tint:#F8EAE8; --blue:#2C5FA8; --blue-tint:#E9EFF7;
    --shadow:0 1px 2px rgba(20,40,45,.04), 0 4px 16px rgba(20,40,45,.05);
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:13.5px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .num { font-variant-numeric:tabular-nums; } .mono { font-family:var(--mono); }
  .zh { font-family:"Segoe UI","Microsoft YaHei",var(--sans); }
  .faint { color:var(--faint); } .muted { color:var(--muted); }
  .app { display:grid; grid-template-columns:238px 1fr; min-height:100vh; }

  /* Rail */
  .rail { background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:16px 12px; gap:2px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .brand { display:flex; align-items:center; gap:10px; padding:4px 8px 12px; }
  .brand .mk { width:34px; height:34px; border-radius:9px; background:linear-gradient(150deg,var(--accent),var(--accent-2)); color:#fff; font-family:var(--display); font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center; letter-spacing:-.3px; box-shadow:var(--shadow); }
  .brand .nm { font-family:var(--display); font-weight:650; font-size:14.5px; letter-spacing:-.2px; }
  .brand .nm span { color:var(--muted); font-weight:400; }
  .nav-cap { font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); padding:12px 10px 4px; }
  .nav-i { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:8px; color:var(--ink); font-size:12.8px; cursor:pointer; }
  .nav-i:hover { background:var(--bg); }
  .nav-i .g { width:18px; text-align:center; color:var(--muted); font-size:13px; }
  .nav-i.on { background:var(--accent-tint); color:var(--accent); font-weight:600; }
  .nav-i.on .g { color:var(--accent); }
  .nav-i .bdg { margin-left:auto; font-size:10px; font-weight:700; color:#fff; background:var(--crit); border-radius:20px; padding:1px 6px; min-width:17px; text-align:center; }
  .nav-i .bdg.gray { color:var(--warn); background:var(--warn-tint); }
  .rail-foot { margin-top:auto; padding:12px 10px 2px; border-top:1px solid var(--line); }
  .rail-foot .k { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); }
  .rail-foot .v { font-family:var(--display); font-size:19px; font-weight:700; margin-top:2px; }
  .rail-foot .v small { font-size:11.5px; color:var(--muted); font-weight:500; }

  /* Topbar */
  .main { min-width:0; display:flex; flex-direction:column; }
  .top { height:58px; display:flex; align-items:center; gap:14px; padding:0 24px; border-bottom:1px solid var(--line); background:color-mix(in srgb, var(--surface) 82%, transparent); backdrop-filter:blur(8px); position:sticky; top:0; z-index:9; }
  .top .ti { font-family:var(--display); font-size:16px; font-weight:650; letter-spacing:-.2px; }
  .search { margin-left:6px; display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:7px 11px; width:290px; color:var(--faint); font-size:12.5px; }
  .search .sl { margin-left:auto; border:1px solid var(--line); border-radius:5px; padding:0 6px; font-family:var(--mono); font-size:10px; background:var(--surface); }
  .top .rt { margin-left:auto; display:flex; align-items:center; gap:13px; }
  .date { font-size:12.5px; color:var(--muted); }
  .icbtn { width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; }
  .icbtn:hover { color:var(--ink); border-color:var(--accent); }
  .ava { width:32px; height:32px; border-radius:50%; background:linear-gradient(150deg,var(--blue),#274e86); color:#fff; font-size:11.5px; font-weight:650; display:flex; align-items:center; justify-content:center; }
  .content { padding:20px 24px 44px; display:flex; flex-direction:column; gap:16px; max-width:1380px; width:100%; }

  /* Page head */
  .ph { display:flex; align-items:flex-end; gap:12px; }
  .ph h1 { font-family:var(--display); font-size:20px; font-weight:700; letter-spacing:-.4px; text-wrap:balance; }
  .ph .sub { color:var(--muted); font-size:12.5px; padding-bottom:2px; }
  .ph .actions { margin-left:auto; display:flex; gap:8px; }

  /* Cards & layout */
  .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); }
  .card-pad { padding:17px 19px; }
  .card-h { display:flex; align-items:center; gap:9px; margin-bottom:13px; }
  .card-h h2 { font-family:var(--display); font-size:13.5px; font-weight:650; letter-spacing:-.1px; }
  .card-h .hint { color:var(--faint); font-size:11.5px; }
  .card-h .more { margin-left:auto; color:var(--accent); font-size:11.5px; font-weight:600; cursor:pointer; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .split { display:grid; grid-template-columns:1.42fr 1fr; gap:16px; align-items:start; }
  .split-r { display:grid; grid-template-columns:1fr 1.42fr; gap:16px; align-items:start; }
  .colstack { display:flex; flex-direction:column; gap:16px; }
  .stack { display:flex; flex-direction:column; gap:11px; }

  /* Tiles */
  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .tiles.t3 { grid-template-columns:repeat(3,1fr); }
  .tiles.t5 { grid-template-columns:repeat(5,1fr); }
  .tile { background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); padding:14px 16px; }
  .tile .lbl { font-size:11.5px; color:var(--muted); }
  .tile .rowb { display:flex; align-items:flex-end; justify-content:space-between; gap:8px; margin-top:6px; }
  .tile .val { font-family:var(--display); font-size:26px; font-weight:700; letter-spacing:-.6px; line-height:1; }
  .tile .val .u { font-size:12.5px; font-weight:500; color:var(--muted); }
  .tile .dl { font-size:11.5px; font-weight:600; margin-top:7px; }
  .up,.down-good { color:var(--ok); } .down { color:var(--crit); } .flat { color:var(--muted); }

  /* Pills, dots, gates */
  .pill { display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:650; border-radius:20px; padding:1.5px 8px; white-space:nowrap; }
  .p-teal { background:var(--accent-tint); color:var(--accent); } .p-blue { background:var(--blue-tint); color:var(--blue); }
  .p-warn { background:var(--warn-tint); color:var(--warn); } .p-crit { background:var(--crit-tint); color:var(--crit); }
  .p-ok { background:var(--ok-tint); color:var(--ok); } .p-gray { background:var(--bg); color:var(--muted); border:1px solid var(--line); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
  .dk-ok { background:var(--ok); } .dk-warn { background:var(--warn); } .dk-crit { background:var(--crit); } .dk-gray { background:var(--faint); } .dk-teal { background:var(--accent); } .dk-blue { background:var(--blue); }
  .gate { font-family:var(--mono); font-size:10px; font-weight:700; border-radius:5px; padding:1.5px 6px; border:1px solid; letter-spacing:.02em; white-space:nowrap; }
  .gt0 { color:var(--ok); border-color:color-mix(in srgb,var(--ok) 34%,transparent); background:var(--ok-tint); }
  .gt1 { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 34%,transparent); background:var(--accent-tint); }
  .gt2 { color:var(--warn); border-color:color-mix(in srgb,var(--warn) 40%,transparent); background:var(--warn-tint); }
  .gt3 { color:var(--crit); border-color:color-mix(in srgb,var(--crit) 40%,transparent); background:var(--crit-tint); }

  /* Buttons */
  .btn { font-size:11.5px; font-weight:650; border-radius:8px; padding:6px 12px; border:1px solid transparent; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .btn-pri { background:var(--accent); color:#fff; } .btn-pri:hover { background:var(--accent-2); }
  .btn-gh { background:var(--surface); border-color:var(--line); color:var(--ink); } .btn-gh:hover { border-color:var(--accent); color:var(--accent); }
  .btn-soft { background:var(--accent-tint); color:var(--accent); } .btn-crit { background:var(--crit-tint); color:var(--crit); }
  .btn-sm { font-size:10.5px; padding:4px 9px; border-radius:7px; }
  .avx { width:21px; height:21px; border-radius:50%; font-size:9px; font-weight:700; color:#fff; display:inline-flex; align-items:center; justify-content:center; background:var(--muted); }

  /* Tables */
  table.t { width:100%; border-collapse:collapse; }
  .t th { text-align:left; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); padding:0 11px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .t td { padding:9px 11px; border-bottom:1px solid var(--grid); font-size:12.5px; vertical-align:middle; }
  .t tr:last-child td { border-bottom:none; }
  .t .num { text-align:right; } .t th.num { text-align:right; }
  .t .main-cell { font-weight:650; } .t .sub-cell { font-size:11px; color:var(--muted); margin-top:1px; font-weight:400; }
  .t.dense td { padding:6px 11px; font-size:12px; }
  .t tr.hl td { background:var(--ok-tint); } .t tr.hlw td { background:var(--warn-tint); }
  .tw { overflow-x:auto; }

  /* Queue / flag cards */
  .qi { border:1px solid var(--line); border-radius:11px; padding:12px 15px 12px 16px; position:relative; background:var(--surface-2); }
  .qi::before { content:""; position:absolute; left:0; top:11px; bottom:11px; width:3px; border-radius:3px; background:var(--faint); }
  .qi.ok::before { background:var(--ok); } .qi.warn::before { background:var(--warn); } .qi.crit::before { background:var(--crit); } .qi.info::before { background:var(--blue); }
  .qi-top { display:flex; align-items:center; gap:9px; margin-bottom:4px; flex-wrap:wrap; }
  .qi-top .qt { font-weight:650; font-size:12.8px; }
  .qi-top .who { margin-left:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .qi-body { font-size:12.3px; color:var(--muted); line-height:1.5; }
  .qi-body b { color:var(--ink); font-weight:600; }
  .qi-act { display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }

  /* Feed */
  .feed { display:flex; flex-direction:column; }
  .fi { display:grid; grid-template-columns:auto 1fr auto; gap:11px; align-items:start; padding:9px 0; border-bottom:1px solid var(--grid); }
  .fi:last-child { border-bottom:none; }
  .fi .tk { width:8px; height:8px; border-radius:50%; margin-top:5px; }
  .tk.a { background:var(--accent); } .tk.b { background:var(--blue); } .tk.g0 { background:var(--ok); }
  .fi .ft { font-size:12.3px; line-height:1.45; }
  .fi .ft .cpill { font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:0 5px; }
  .fi .ft small { color:var(--faint); }
  .fi .fr { text-align:right; white-space:nowrap; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .fi .fr .tm { font-size:10.5px; color:var(--faint); }

  /* Meters / tracks */
  .track { height:8px; border-radius:5px; background:var(--bg); overflow:hidden; border:1px solid var(--line); }
  .track > i { display:block; height:100%; width:0; border-radius:5px; background:var(--accent); transition:width .9s cubic-bezier(.2,.7,.2,1); }
  .track.warn > i { background:var(--warn); } .track.crit > i { background:var(--crit); } .track.ok > i { background:var(--ok); } .track.blue > i { background:var(--blue); }
  .area { display:flex; flex-direction:column; gap:11px; }
  .ar { display:grid; grid-template-columns:130px 1fr 44px; gap:11px; align-items:center; }
  .ar .an { font-size:12px; font-weight:600; } .ar .an small { display:block; color:var(--faint); font-size:10.5px; font-weight:400; }
  .ar .av { font-family:var(--mono); font-size:11.5px; font-weight:700; text-align:right; }

  /* Coverage bar */
  .cov { display:grid; grid-template-columns:auto 1fr; gap:26px; align-items:center; }
  .cov-lead .big { font-family:var(--display); font-size:33px; font-weight:750; letter-spacing:-1px; line-height:1; }
  .cov-lead .cap { font-size:12px; color:var(--muted); margin-top:4px; }
  .cov-bar { display:flex; height:14px; border-radius:8px; overflow:hidden; gap:2px; }
  .cov-bar > i { display:block; height:100%; width:0; transition:width .9s cubic-bezier(.2,.7,.2,1); border-radius:3px; }
  .seg-auto { background:var(--accent); } .seg-you { background:var(--warn); } .seg-lock { background:var(--crit); }
  .cov-leg { display:flex; gap:20px; margin-top:14px; flex-wrap:wrap; }
  .lg { display:flex; gap:9px; align-items:flex-start; } .lg .sw { width:11px; height:11px; border-radius:3px; margin-top:3px; flex:none; }
  .lg .lt { font-size:12px; } .lg .lt b { font-weight:650; } .lg .lt small { display:block; color:var(--faint); font-size:11px; }
  .sw.g0 { background:var(--ok); } .sw.g1 { background:var(--accent); } .sw.g2 { background:var(--warn); } .sw.g3 { background:var(--crit); }

  /* Kanban */
  .kan { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; align-items:start; }
  .kan-col { background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:10px; }
  .kan-h { display:flex; align-items:baseline; gap:6px; padding:0 3px 9px; }
  .kan-h .n { font-size:12px; font-weight:700; } .kan-h .c { font-size:11px; color:var(--muted); }
  .kan-h .sum { margin-left:auto; font-size:11px; color:var(--muted); }
  .deal { background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:10px 11px; margin-bottom:8px; box-shadow:var(--shadow); }
  .deal .dn { font-weight:650; font-size:12px; margin-bottom:2px; } .deal .ds { font-size:11px; color:var(--muted); line-height:1.4; }
  .deal .df { display:flex; align-items:center; gap:6px; margin-top:8px; } .deal .dv { margin-left:auto; font-size:11px; font-weight:700; }

  /* Workflow chain */
  .wf-row { display:flex; align-items:center; gap:14px; padding:11px 0; border-bottom:1px solid var(--grid); }
  .wf-row:last-child { border-bottom:none; }
  .wf-name { width:172px; min-width:172px; } .wf-name .n { font-weight:650; font-size:12.5px; display:flex; align-items:center; gap:7px; } .wf-name .s { font-size:11px; color:var(--muted); margin-top:2px; }
  .wf-chain { display:flex; align-items:center; gap:3px; flex-wrap:wrap; flex:1; min-width:0; }
  .wf-node { display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600; border-radius:6px; padding:3px 8px; border:1px solid var(--line); background:var(--bg); color:var(--muted); white-space:nowrap; }
  .wf-node.done { background:var(--accent-tint); color:var(--accent); border-color:color-mix(in srgb,var(--accent) 30%,transparent); }
  .wf-node.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); }
  .wf-node.active .pulse { width:6px; height:6px; border-radius:50%; background:#fff; }
  .wf-node.gate { background:var(--warn-tint); color:var(--warn); border-color:color-mix(in srgb,var(--warn) 34%,transparent); }
  .wf-node.block { background:var(--crit-tint); color:var(--crit); border-color:color-mix(in srgb,var(--crit) 34%,transparent); }
  .wf-node.queued { background:var(--surface); color:var(--faint); border-style:dashed; }
  .wf-arrow { color:var(--faint); font-size:10px; }
  .wf-now { width:220px; min-width:220px; font-size:11px; color:var(--muted); line-height:1.4; }

  /* Banner */
  .banner { display:flex; align-items:center; gap:10px; border-radius:10px; padding:10px 14px; font-size:12.5px; }
  .b-info { background:var(--blue-tint); color:var(--blue); } .b-warn { background:var(--warn-tint); color:var(--warn); } .b-ok { background:var(--ok-tint); color:var(--ok); }
  .banner b { font-weight:700; } .banner .bx { margin-left:auto; font-weight:700; }
  .sec-lbl { font-size:10.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); }

  .wfstrip { display:flex; gap:10px; flex-wrap:wrap; }
  .wfc { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 13px; background:var(--surface-2); font-size:12px; }
  .wfc .d { width:7px; height:7px; border-radius:50%; }
  .d.ok { background:var(--ok); box-shadow:0 0 0 3px var(--ok-tint); } .d.run { background:var(--accent); box-shadow:0 0 0 3px var(--accent-tint); } .d.wait { background:var(--warn); box-shadow:0 0 0 3px var(--warn-tint); }
  .wfc b { font-weight:650; } .wfc small { color:var(--muted); }

  /* Intake wizard */
  .wz { max-width:760px; margin:0 auto; }
  .wz-type { display:flex; gap:8px; margin-bottom:16px; }
  .wz-type button { flex:1; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-family:inherit; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; }
  .wz-type button.on { border-color:var(--accent); background:var(--accent-tint); color:var(--accent); }
  .wz-type button small { display:block; font-weight:400; font-size:10.5px; color:var(--faint); margin-top:1px; }
  .wz-type button.on small { color:var(--accent); }
  .wz-rail { display:flex; align-items:center; gap:0; margin-bottom:18px; }
  .wz-node { display:flex; align-items:center; gap:0; flex:1; }
  .wz-node:last-child { flex:0; }
  .wz-node .b { width:24px; height:24px; min-width:24px; border-radius:50%; border:2px solid var(--line); background:var(--surface); font-size:11px; font-weight:700; color:var(--faint); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .wz-node.done .b { background:var(--accent); border-color:var(--accent); color:#fff; }
  .wz-node.cur .b { border-color:var(--accent); color:var(--accent); box-shadow:0 0 0 4px var(--accent-tint); }

      body: fTxt('Who is your ideal patient?','',(''))
        + `<div class="grid2">${fTxt('Average lifetime value per patient','helps us frame your ROI in real dollars','$')}${fTxt('Current capacity','how many can you take on vs now','')}</div>`
        + fArea('How would patients find you online?','Keywords or phrases they\'d search, and any landmarks near you (schools, shopping centres) — this becomes your money-keyword list.','')
        + fSel('Preferred health funds','trust signals + schema',['Select all that apply…','Bupa','HCF','Medibank','nib','Multiple'])
        + (type!=='specialist' ? fTxt('HiCaps provider number','8-digit number on the side of your HiCaps terminal','') : '') };

        + fArea('Websites you like — and why','Be specific: it\'s not the sites, it\'s the *why* that decodes your taste into design direction.','','sites')
        + `<div class="grid2">${fSel('Patient management software','booking-CTA wiring',(type==='specialist'?['Genie','Gentu','Other','None']:['Cliniko','Nookal','Dental4Windows','Praktika','Other']))}${fSel('Uses online booking?',' ',['Yes','No','Want to add it'])}</div>`
        + `<div class="grid2">${fTxt('Social accounts','we\'ll link them','instagram.com/…',true)}${fTxt('Current site maintainer','',(type==='specialist'?'in-house':'Emergent'),true)}</div>` };

          type==='specialist'

        + slot('◧','Practice & team photos','real photos beat stock everywhere — shoot offered week 3–4',false)

}
const revRow = (l,v) => `<div class="rev-row"><span class="rl">${l}</span><span class="rv">${v}</span><span class="re">Edit</span></div>`;

function renderWizard(){
  const el = document.getElementById('wz'); if(!el) return;
  const s = WZ.step, last = STEP_LBLS.length-1;
  const rail = STEP_LBLS.map((_,i)=>`<div class="wz-node ${i<s?'done':i===s?'cur':''}"><span class="b" data-wzgoto="${i}">${i<s?'✓':i+1}</span>${i<last?'<span class="ln"></span>':''}</div>`).join('');
  const sb = stepBody(s, WZ.type);
  el.innerHTML = `<div class="wz-rail">${rail}</div><div class="wz-step-lbl">Step ${s+1} of ${STEP_LBLS.length} · ${STEP_LBLS[s]}</div>
    <div class="wz-card"><h2>${sb.title}</h2><div class="lead">${sb.lead}</div>${sb.body}
    <div class="wz-foot">
      ${s>0?'<button class="btn btn-gh" data-wz="back">← Back</button>':''}
      <span class="wz-save"><span class="d"></span>Saved just now</span>
      <span class="wz-count">Step ${s+1} of ${STEP_LBLS.length}</span>
      ${s<last?`<button class="btn btn-pri" data-wz="next">${s===0?'Start →':'Next →'}</button>`:'<button class="btn btn-pri" data-wz="next">Submit questionnaire</button>'}
    </div></div>`;
}

/* ---------- render + interactions ---------- */
function drawSpk(svg){
  const pts=svg.dataset.pts.split(',').map(Number), w=+svg.getAttribute('width'), h=+svg.getAttribute('height'), pad=3;
  const min=Math.min(...pts), max=Math.max(...pts), sx=w/(pts.length-1);
  const sy=v=>max===min?h/2:pad+(h-2*pad)*(1-(v-min)/(max-min));
  const d=pts.map((v,i)=>(i?'L':'M')+(i*sx).toFixed(1)+' '+sy(v).toFixed(1)).join(' ');
  const col=svg.dataset.color==='ok'?'var(--ok)':'var(--accent)', ns='http://www.w3.org/2000/svg';
  const area=document.createElementNS(ns,'path'); area.setAttribute('d',d+` L${w} ${h} L0 ${h} Z`); area.setAttribute('fill',col); area.setAttribute('opacity','.10');
  const pl=document.createElementNS(ns,'path'); pl.setAttribute('d',d); pl.setAttribute('fill','none'); pl.setAttribute('stroke',col); pl.setAttribute('stroke-width','2'); pl.setAttribute('stroke-linecap','round'); pl.setAttribute('stroke-linejoin','round');
  const lx=(pts.length-1)*sx, ly=sy(pts[pts.length-1]);
  const dot=document.createElementNS(ns,'circle'); dot.setAttribute('cx',lx.toFixed(1)); dot.setAttribute('cy',ly.toFixed(1)); dot.setAttribute('r','3'); dot.setAttribute('fill',col); dot.setAttribute('stroke','var(--surface)'); dot.setAttribute('stroke-width','2');
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`); svg.style.overflow='visible'; svg.append(area,pl,dot);
}
function animate(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('[data-bar] > i, .track > i').forEach(el=>{ el.style.width=el.dataset.w+'%'; });
  }));
}
function render(id){
  if(!P[id]) id='today';
  const view=document.getElementById('view');
  view.innerHTML=P[id]();
  document.getElementById('ptitle').textContent=TITLES[id]||'Today';
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.toggle('on',n.dataset.page===id));
  if(id==='intake'){ WZ.step=0; renderWizard(); }
  view.querySelectorAll('.spk').forEach(drawSpk);
  animate();
  window.scrollTo(0,0);
}
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-page]'); if(nav){ location.hash=nav.dataset.page; return; }
  const go=e.target.closest('[data-go]'); if(go){ location.hash=go.dataset.go; return; }
  const st=e.target.closest('[data-set-theme]'); if(st){ document.documentElement.setAttribute('data-theme',st.dataset.setTheme); return; }
  const ty=e.target.closest('[data-wztype]'); if(ty){ WZ.type=ty.dataset.wztype; renderWizard(); return; }
  const goto=e.target.closest('[data-wzgoto]'); if(goto){ const i=+goto.dataset.wzgoto; if(i<=WZ.step){ WZ.step=i; renderWizard(); } return; }
  const wz=e.target.closest('[data-wz]'); if(wz){
    if(wz.dataset.wz==='next') WZ.step=Math.min(STEP_LBLS.length-1, WZ.step+1);
    else if(wz.dataset.wz==='back') WZ.step=Math.max(0, WZ.step-1);
    renderWizard(); window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  const chip=e.target.closest('.chip'); if(chip){ chip.classList.toggle('on'); return; }
});
document.addEventListener('input',e=>{
  const ta=e.target.closest('[data-pb]'); if(!ta) return;
  const pb=document.getElementById('pb-'+ta.dataset.pb); if(!pb) return;
  const n=ta.value.trim().length; pb.classList.toggle('show', n>0 && n<45);
});
document.getElementById('theme').addEventListener('click',()=>{
  const root=document.documentElement, dark=matchMedia('(prefers-color-scheme: dark)').matches;
  const cur=root.getAttribute('data-theme')||(dark?'dark':'light');
  root.setAttribute('data-theme',cur==='dark'?'light':'dark');
});
window.addEventListener('hashchange',()=>render(location.hash.slice(1)));
render(location.hash.slice(1)||'today');
</script>
